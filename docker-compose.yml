# Multi-intersection ATMS stack. Each virtual intersection runs in its own
# lightweight container; the gateway backend polls them all and the frontend
# serves the dashboard. The physical 2070 stays intersection #1 and is reached
# by running the backend on the host instead (see docs), since it lives on the
# bench Ethernet segment, not the Docker network.

# Shared emulator shape: one image, restart on crash so a killed container
# degrades its tile and then heals on its own.
x-emulator: &emulator
  build: ./emulator
  restart: unless-stopped

services:
  emulator-1:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-1 }
  emulator-2:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-2 }
  emulator-3:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-3 }
  emulator-4:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-4 }

  # Slots 5-10 are defined but not started by default, so a plain
  # `docker compose up` keeps today's 4-intersection footprint. Bring one up
  # with `docker compose --profile extra up -d emulator-5`, then register it
  # as an intersection from the UI (host = the service name, port 161).
  emulator-5:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-5 }
    profiles: ["extra"]
  emulator-6:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-6 }
    profiles: ["extra"]
  emulator-7:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-7 }
    profiles: ["extra"]
  emulator-8:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-8 }
    profiles: ["extra"]
  emulator-9:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-9 }
    profiles: ["extra"]
  emulator-10:
    <<: *emulator
    environment: { EMU_SYS_NAME: VirtualASC-10 }
    profiles: ["extra"]

  # Hi-res event store (M10). Also reachable from a host-run backend at
  # localhost:5455 (set ATMS_DB_DSN in .env, see .env.example).
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atms
      POSTGRES_PASSWORD: atms
      POSTGRES_DB: atms
    ports:
      - "5455:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atms -d atms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ATMS_DB_DSN: postgresql://atms:atms@postgres:5432/atms
    # python:slim has no curl; probe /healthz with the stdlib instead.
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      emulator-1:
        condition: service_started
      emulator-2:
        condition: service_started
      emulator-3:
        condition: service_started
      emulator-4:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
